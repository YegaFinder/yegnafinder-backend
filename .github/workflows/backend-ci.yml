name: Backend CI

on:
  push:
    branches: [develop, main, 'feature/**']
  pull_request:
    branches: [develop, main]

jobs:
  # ── Lint & Build ────────────────────────────────────────────────────────────
  build:
    name: TypeScript Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run build

      - name: Lint
        run: npm run lint --if-present

  # ── Unit Tests ──────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: yegnafinder_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 8000
      FRONTEND_ORIGIN: http://localhost:3000
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: yegnafinder_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: ci_test_jwt_secret
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ci_test_refresh_secret
      JWT_REFRESH_EXPIRES_IN: 7d
      OTP_EXPIRY_SECONDS: 300
      OTP_LENGTH: 6
      GOOGLE_CLIENT_ID: placeholder_for_ci
      SMTP_HOST: localhost
      SMTP_PORT: 587
      SMTP_USER: test@example.com
      SMTP_PASS: testpass
      SMTP_FROM: '"YegnaFinder" <no-reply@yegnafinder.com>'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test --if-present

  # ── Docker Build Validation ─────────────────────────────────────────────────
  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: yegnafinder-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
