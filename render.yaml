services:
  - type: web
    name: yegnafinder-api
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_ORIGIN
        value: "https://your-vercel-domain.vercel.app" # ⚠️ TODO: Replace with your actual Vercel URL
      - key: DB_HOST
        fromDatabase:
          name: yf-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: yf-postgres
          property: port
      - key: DB_USERNAME
        fromDatabase:
          name: yf-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: yf-postgres
          property: password
      - key: DB_NAME
        fromDatabase:
          name: yf-postgres
          property: database
      - key: REDIS_HOST
        fromService:
          type: redis
          name: yf-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: yf-redis
          property: port
      - key: REDIS_PASSWORD
        value: ""
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "15m"
      - key: JWT_REFRESH_EXPIRES_IN
        value: "7d"
      - key: OTP_EXPIRY_SECONDS
        value: "300"
      - key: OTP_LENGTH
        value: "6"
      - key: SMTP_PORT
        value: "587"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

  - type: redis
    name: yf-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: [] # internal access only by default

databases:
  - name: yf-postgres
    plan: free
